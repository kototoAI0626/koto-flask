<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>箏符コンバーター — Koto.to</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8a96e;--deep:#9c7a3a;--ink:#1a1209;--ash:#8a7a68;--cream:#ede7d9;--bg:#0e0b06}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
header{background:var(--ink);padding:14px 20px;text-align:center;border-bottom:1px solid #333}
.logo{font-family:serif;font-size:20px;color:var(--gold);letter-spacing:.15em}
.sub{font-size:11px;color:#555;letter-spacing:.15em;margin-top:2px}
main{max-width:720px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--ink);border:1px solid #333;border-radius:6px;margin-bottom:16px;overflow:hidden}
.card-title{background:#221a10;padding:9px 16px;font-family:serif;font-size:11px;color:var(--gold);letter-spacing:.25em;border-bottom:1px solid #333}
.card-body{padding:16px}
.drop-zone{border:2px dashed #444;border-radius:4px;padding:28px 16px;text-align:center;cursor:pointer;font-size:14px;color:#555;line-height:1.8;transition:all .15s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--gold);color:var(--ash)}
.drop-zone.has-file{border-color:var(--gold);color:var(--gold)}
.drop-icon{font-size:28px;margin-bottom:6px}
.page-list{margin-top:10px;display:none}
.page-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#0e0b06;border:1px solid #333;border-radius:3px;margin-bottom:4px;font-size:12px;color:var(--ash)}
.page-item .pg-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-item .pg-num{color:#555;font-size:11px;margin-right:8px;white-space:nowrap}
.page-item .pg-del{color:#555;cursor:pointer;padding:0 4px;font-size:14px}
.page-item .pg-del:hover{color:#f08}
.page-count{font-size:11px;color:var(--ash);margin-top:6px}
.analyze-btn{width:100%;padding:11px;background:#0e1a0e;border:1px solid #2a5a2a;border-radius:4px;color:#8be08b;font-family:serif;font-size:13px;cursor:pointer;letter-spacing:.1em;transition:all .15s;margin-top:10px}
.analyze-btn:hover{background:#1a3a1a;border-color:#4a9a4a}
.analyze-btn:disabled{opacity:.5;cursor:not-allowed}
.suggest-box{margin-top:12px;padding:12px;background:#0a140a;border:1px solid #2a4a2a;border-radius:4px;display:none}
.suggest-title{font-size:11px;color:#4a9a4a;letter-spacing:.2em;margin-bottom:6px}
.suggest-name{font-family:serif;font-size:16px;color:var(--gold);margin-bottom:8px}
.tuning-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
.tuning-cell{text-align:center;font-size:10px;color:var(--ash)}
.tuning-string{font-family:serif;font-size:13px;color:var(--gold);display:block}
.tuning-note{font-size:11px;color:#aaa;display:block;margin-top:1px}
.unmatched-warn{font-size:11px;color:#f88;margin-top:8px;padding:6px 10px;background:#2a0a0a;border-radius:3px;display:none}
.pattern-grid{display:flex;flex-wrap:wrap;gap:6px}
.pattern-btn{padding:6px 12px;background:#1a1209;border:1px solid #555;border-radius:3px;color:var(--ash);font-family:serif;font-size:13px;cursor:pointer;transition:all .12s}
.pattern-btn:hover{border-color:var(--gold);color:var(--gold)}
.pattern-btn.active{background:var(--deep);border-color:var(--gold);color:#f7f3ec}
.root-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.root-label{font-size:12px;color:var(--ash);white-space:nowrap}
.root-btn{padding:5px 8px;background:#1a1209;border:1px solid #555;border-radius:3px;color:var(--ash);font-size:12px;cursor:pointer;transition:all .12s}
.root-btn:hover{border-color:var(--gold);color:var(--gold)}
.root-btn.active{background:var(--deep);border-color:var(--gold);color:#f7f3ec}
.tuning-display{margin-top:12px;padding:10px 12px;background:#0e0b06;border:1px solid #333;border-radius:3px}
.tuning-display-title{font-size:10px;color:#555;letter-spacing:.2em;margin-bottom:6px}
.tuning-row{display:flex;flex-wrap:wrap;gap:6px}
.tuning-item .ks{font-family:serif;color:var(--gold)}
.tuning-item .kn{color:#ccc}
.tuning-item{font-size:12px;color:var(--ash)}
.transpose-row{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.transpose-label{font-size:12px;color:var(--ash);white-space:nowrap}
.tr-btn{padding:5px 10px;background:#1a1209;border:1px solid #555;border-radius:3px;color:var(--ash);font-size:13px;cursor:pointer;transition:all .12s;min-width:32px;text-align:center}
.tr-btn:hover{border-color:var(--gold);color:var(--gold)}
.tr-display{font-family:serif;font-size:14px;color:var(--gold);min-width:70px;text-align:center;padding:4px 8px;border:1px solid #444;border-radius:3px;background:#0e0b06}
.slider-row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ash);margin-top:12px}
input[type=range]{flex:1;accent-color:var(--gold)}
.btn{width:100%;padding:14px;background:var(--deep);border:1px solid var(--gold);border-radius:4px;color:#f7f3ec;font-family:serif;font-size:15px;cursor:pointer;letter-spacing:.1em;transition:all .15s;margin-top:8px}
.btn:hover{background:var(--gold)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sub{background:transparent;border-color:#444;color:var(--ash)}
.btn-sub:hover{border-color:var(--gold);color:var(--gold);background:transparent}
.loading{display:none;text-align:center;padding:24px;color:var(--gold);font-size:13px}
.spinner{width:24px;height:24px;border:3px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.msg-ok{padding:10px 14px;background:#0e1a0e;border:1px solid #2a4a2a;color:#8be08b;border-radius:3px;font-size:12px;margin-bottom:12px}
.msg-err{padding:10px 14px;background:#2a0a0a;border:1px solid #5a1a1a;color:#f08;border-radius:3px;font-size:12px;margin-bottom:12px}
.result-img{width:100%;display:block;border:1px solid #333;border-radius:3px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px;color:var(--ash)}
.lk{font-family:serif;font-size:18px;font-weight:bold}
@media print{header,.card:not(.result-card),.btn{display:none!important}body{background:#fff}.result-img{width:100%;border:none}}
</style>
</head>
<body>
<header>
  <div class="logo">箏符コンバーター</div>
  <div class="sub">楽譜画像をアップロードするだけで箏符を自動付与 — Koto.to</div>
</header>
<main>

  <!-- ① 楽譜アップロード -->
  <div class="card">
    <div class="card-title">① 楽譜画像をアップロード（複数ページ対応）</div>
    <div class="card-body">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📄</div>
        <div id="file-label">タップして楽譜を選択</div>
        <div style="font-size:11px;color:#444;margin-top:4px">JPG・PNG対応 ／ 複数ページは複数枚選択可</div>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="onFile(event)">
      <div class="page-list" id="page-list"></div>
      <div class="page-count" id="page-count"></div>
      <button class="analyze-btn" id="analyze-btn" onclick="analyzeScore()" disabled>
        🔍 全ページを分析して調弦を自動提案
      </button>
      <div class="suggest-box" id="suggest-box">
        <div class="suggest-title">▶ 自動提案</div>
        <div class="suggest-name" id="suggest-name">—</div>
        <div class="tuning-grid" id="suggest-tuning-grid"></div>
        <div class="unmatched-warn" id="unmatched-warn"></div>
      </div>
    </div>
  </div>

  <!-- ② 調弦設定 -->
  <div class="card">
    <div class="card-title">② 調子と壱の音を選択</div>
    <div class="card-body">
      <!-- 調子選択 -->
      <div style="font-size:11px;color:#555;margin-bottom:6px">調子</div>
      <div class="pattern-grid" id="pattern-grid">
        {% for name in patterns %}
        <button class="pattern-btn {% if name=='楽調子' %}active{% endif %}"
                onclick="selectPattern('{{name}}',this)">{{name}}</button>
        {% endfor %}
      </div>
      <!-- 壱の音選択 -->
      <div style="font-size:11px;color:#555;margin-top:12px;margin-bottom:6px">壱の音</div>
      <div class="root-row" id="root-row">
        <!-- JavaScriptで生成 -->
      </div>
      <!-- 調弦表示 -->
      <div class="tuning-display" id="tuning-display">
        <div class="tuning-display-title">現在の調弦（チューナー用）</div>
        <div class="tuning-row" id="tuning-row"></div>
      </div>
      <!-- 移調 -->
      <div class="transpose-row">
        <span class="transpose-label">移調：</span>
        <button class="tr-btn" onclick="changeTranspose(-1)">−</button>
        <span class="tr-display" id="tr-display">0</span>
        <button class="tr-btn" onclick="changeTranspose(+1)">＋</button>
        <button class="tr-btn" onclick="resetTranspose()" style="font-size:11px;padding:5px 8px">リセット</button>
      </div>
      <!-- 漢字サイズ -->
      <div class="slider-row" style="margin-top:14px">
        <span>漢字サイズ</span>
        <input type="range" id="font-size" min="12" max="30" value="20">
        <span id="fs-val">20px</span>
      </div>
    </div>
  </div>

  <!-- 変換ボタン -->
  <button class="btn" id="convert-btn" onclick="convert()" disabled>
    🎵 箏符を自動付与する
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loading-msg">音符を自動検出して箏符を付与中...</span>
  </div>

  <div id="result-area"></div>

  <!-- 凡例 -->
  <div class="card">
    <div class="card-title">記号の凡例</div>
    <div class="card-body">
      <div class="legend">
        <div class="legend-item"><span class="lk" style="color:#c8a96e">五</span>開放弦</div>
        <div class="legend-item"><span class="lk" style="color:#1a6aaa">五△</span>弱押し（半音上）</div>
        <div class="legend-item"><span class="lk" style="color:#7a1aaa">五▲</span>強押し（全音上）</div>
      </div>
    </div>
  </div>

</main>
<script>
let currentFiles = [], patternName = '楽調子', rootMidi = 55, transposeVal = 0;
let pageImages = [];

// 壱の音の候補（C3〜B3）
const ROOT_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ROOT_OCTAVE = 3;
// C3のMIDI = (3+1)*12 + 0 = 48
function noteToMidi(note, octave) {
  const idx = ROOT_NOTES.indexOf(note);
  return (octave + 1) * 12 + idx;
}

// 壱の音ボタンを生成
function buildRootButtons() {
  const row = document.getElementById('root-row');
  row.innerHTML = '';
  ROOT_NOTES.forEach(note => {
    const btn = document.createElement('button');
    btn.className = 'root-btn' + (note === 'G' ? ' active' : '');
    btn.textContent = note;
    btn.onclick = () => selectRoot(note, btn);
    row.appendChild(btn);
  });
}
buildRootButtons();

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over') });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
});

function onFile(e) { addFiles(Array.from(e.target.files)); }

function addFiles(files) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  if (!imgs.length) return;
  currentFiles = currentFiles.concat(imgs);
  currentFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
  renderPageList();
  document.getElementById('convert-btn').disabled = false;
  document.getElementById('analyze-btn').disabled = false;
  document.getElementById('suggest-box').style.display = 'none';
}

function removeFile(idx) {
  currentFiles.splice(idx, 1);
  renderPageList();
  if (!currentFiles.length) {
    document.getElementById('convert-btn').disabled = true;
    document.getElementById('analyze-btn').disabled = true;
  }
}

function renderPageList() {
  const list = document.getElementById('page-list');
  const count = document.getElementById('page-count');
  if (!currentFiles.length) {
    list.style.display = 'none'; count.textContent = '';
    dz.classList.remove('has-file');
    document.getElementById('file-label').textContent = 'タップして楽譜を選択';
    return;
  }
  list.style.display = 'block';
  dz.classList.add('has-file');
  document.getElementById('file-label').textContent = `✅ ${currentFiles.length}ページ選択済み`;
  list.innerHTML = currentFiles.map((f, i) =>
    `<div class="page-item"><span class="pg-num">p${i+1}</span><span class="pg-name">${f.name}</span><span class="pg-del" onclick="removeFile(${i})">✕</span></div>`
  ).join('');
  count.textContent = `合計 ${currentFiles.length} ページ`;
}

async function selectPattern(name, btn) {
  patternName = name;
  document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  await updateTuningDisplay();
}

async function selectRoot(note, btn) {
  rootMidi = noteToMidi(note, ROOT_OCTAVE);
  document.querySelectorAll('.root-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  await updateTuningDisplay();
}

async function updateTuningDisplay() {
  try {
    const res = await fetch(`/tuning_info?pattern_name=${encodeURIComponent(patternName)}&root_midi=${rootMidi}`);
    const data = await res.json();
    const row = document.getElementById('tuning-row');
    row.innerHTML = data.tuning_display.map(t =>
      `<span class="tuning-item"><span class="ks">${t.string}</span>=<span class="kn">${t.note}</span></span>`
    ).join('');
  } catch(e) {}
}
updateTuningDisplay();

document.getElementById('font-size').addEventListener('input', function() {
  document.getElementById('fs-val').textContent = this.value + 'px';
});

function changeTranspose(delta) {
  transposeVal = Math.max(-12, Math.min(12, transposeVal + delta));
  const el = document.getElementById('tr-display');
  el.textContent = transposeVal === 0 ? '0' : (transposeVal > 0 ? '+' : '') + transposeVal + ' 半音';
}
function resetTranspose() { transposeVal = 0; document.getElementById('tr-display').textContent = '0'; }

async function analyzeScore() {
  if (!currentFiles.length) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.textContent = `🔍 ${currentFiles.length}ページを分析中...`;
  try {
    const fd = new FormData();
    for (const f of currentFiles) fd.append('images', f);
    const res = await fetch('/analyze_multi', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { alert('分析エラー: ' + data.error); return; }

    const box = document.getElementById('suggest-box');
    box.style.display = 'block';
    document.getElementById('suggest-name').textContent =
      `推奨: ${data.pattern_name}（壱=${data.root_note}）`;

    const grid = document.getElementById('suggest-tuning-grid');
    grid.innerHTML = data.tuning_display.map(t =>
      `<div class="tuning-cell"><span class="tuning-string">${t.string}</span><span class="tuning-note">${t.note}</span></div>`
    ).join('');

    const warn = document.getElementById('unmatched-warn');
    if (data.unmatched_notes && data.unmatched_notes.length > 0) {
      warn.style.display = 'block';
      warn.textContent = `⚠ 対応できない音: ${data.unmatched_notes.join(', ')}`;
    } else {
      warn.style.display = 'none';
    }

    // 自動選択
    patternName = data.pattern_name;
    rootMidi = data.root_midi;
    document.querySelectorAll('.pattern-btn').forEach(b => {
      if (b.textContent === data.pattern_name) b.classList.add('active');
      else b.classList.remove('active');
    });
    const rootNote = data.root_note;
    document.querySelectorAll('.root-btn').forEach(b => {
      if (b.textContent === rootNote) b.classList.add('active');
      else b.classList.remove('active');
    });
    await updateTuningDisplay();
  } catch(e) {
    alert('通信エラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 全ページを分析して調弦を自動提案';
  }
}

async function convert() {
  if (!currentFiles.length) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('convert-btn').disabled = true;
  document.getElementById('loading-msg').textContent =
    currentFiles.length > 1
      ? `${currentFiles.length}ページの音符を検出中...（しばらくお待ちください）`
      : '音符を自動検出して箏符を付与中...';

  try {
    const fd = new FormData();
    for (const f of currentFiles) fd.append('images', f);
    fd.append('pattern_name', patternName);
    fd.append('root_midi', rootMidi);
    fd.append('font_size', document.getElementById('font-size').value);
    fd.append('transpose', transposeVal);

    const res = await fetch('/process_multi', { method: 'POST', body: fd });
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';

    const trLabel = transposeVal !== 0 ? `・移調${transposeVal>0?'+':''}${transposeVal}半音` : '';
    const tuningLabel = `${data.pattern_name || patternName}（壱=${data.root_note || '?'}）`;

    if (data.error) {
      document.getElementById('result-area').innerHTML = `<div class="msg-err">❌ ${data.error}</div>`;
      return;
    }

    const tdHtml = data.tuning_display
      ? data.tuning_display.map(t => `<span class="tuning-item"><span class="ks">${t.string}</span>=<span class="kn">${t.note}</span></span>`).join('')
      : '';

    if (data.mode === 'single') {
      pageImages = [{ page: 1, image: data.image, filename: '箏符楽譜.jpg' }];
      document.getElementById('result-area').innerHTML = `
        <div class="msg-ok">✅ ${data.message}</div>
        ${tdHtml ? `<div class="tuning-row" style="margin-bottom:8px;padding:6px 8px;background:var(--ink);border:1px solid #333;border-radius:3px">${tdHtml}</div>` : ''}
        <div class="card result-card">
          <div class="card-title">箏符プレビュー（${tuningLabel}${trLabel}）</div>
          <div class="card-body" style="padding:8px"><img src="${data.image}" class="result-img"></div>
        </div>
        <button class="btn" onclick="downloadPage(0)">⬇ ダウンロード</button>
        <button class="btn btn-sub" onclick="printAll()" style="margin-top:6px">🖨 印刷</button>
      `;
    } else {
      pageImages = data.images;
      let pagesHtml = '';
      data.images.forEach((pg, idx) => {
        pagesHtml += `
          <div class="card result-card" style="margin-bottom:10px">
            <div class="card-title">p${pg.page}（${tuningLabel}${trLabel}）</div>
            <div class="card-body" style="padding:8px"><img src="${pg.image}" class="result-img"></div>
          </div>
          <button class="btn" onclick="downloadPage(${idx})" style="margin-bottom:6px">⬇ p${pg.page} をダウンロード</button>
        `;
      });
      document.getElementById('result-area').innerHTML = `
        <div class="msg-ok">✅ ${data.message}</div>
        ${tdHtml ? `<div class="tuning-row" style="margin-bottom:8px;padding:6px 8px;background:var(--ink);border:1px solid #333;border-radius:3px">${tdHtml}</div>` : ''}
        <button class="btn" onclick="printAll()" style="margin-bottom:12px">🖨 全ページ印刷</button>
        ${pagesHtml}
      `;
    }
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-area').innerHTML = `<div class="msg-err">❌ 通信エラー: ${e.message}</div>`;
  }
  document.getElementById('convert-btn').disabled = false;
}

function downloadPage(idx) {
  const pg = pageImages[idx];
  if (!pg) return;
  const a = document.createElement('a');
  a.href = pg.image;
  a.download = pg.filename || `箏符楽譜_p${idx+1}.jpg`;
  a.click();
}

function printAll() {
  const w = window.open('', '_blank');
  const imgs = pageImages.map((pg, i) =>
    `<div style="page-break-after:${i<pageImages.length-1?'always':'avoid'};text-align:center;">
      <img src="${pg.image}" style="max-width:100%;height:auto;">
    </div>`
  ).join('');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>箏符楽譜</title>
    <style>body{margin:0;padding:0}@media print{@page{margin:5mm}}</style>
    </head><body>${imgs}<script>window.onload=function(){window.print();}<\/script></body></html>`);
  w.document.close();
}
</script>
</body>
</html>
